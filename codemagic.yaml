workflows:
  android-apk:
    name: Flashlight Strobe - Release APK
    max_build_duration: 90
    environment:
      java: 17
      groups:
        - SUPABASE
        - CM
      vars:
        COREPACK_ENABLE_STRICT: "0"
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - $HOME/.cache/pnpm

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install pnpm
        script: |
          corepack disable || true
          npm install -g pnpm@latest --force
          pnpm --version

      - name: Install JS dependencies
        script: |
          set -e

          # Detect paths dynamically — Codemagic's working dir is the parent of
          # the actual clone directory, so we can't hardcode paths.
          APP_DIR=$(find . -maxdepth 5 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          APP_ABS=$(cd "$APP_DIR" && pwd)

          WORKSPACE_YAML=$(find . -maxdepth 6 -name "pnpm-workspace.yaml" 2>/dev/null | head -1)
          if [ -z "$WORKSPACE_YAML" ]; then
            echo "ERROR: no pnpm-workspace.yaml found"
            exit 1
          fi
          WORKSPACE_ABS=$(cd "$(dirname "$WORKSPACE_YAML")" && pwd)

          echo "Workspace root: $WORKSPACE_ABS"
          echo "App dir:        $APP_ABS"

          # Install all workspace dependencies with shameful hoisting.
          cd "$WORKSPACE_ABS"
          pnpm install --no-frozen-lockfile --shamefully-hoist

          # CRITICAL FIX: babel-preset-expo is a transitive dependency that pnpm
          # stores in its isolated .pnpm virtual store. Even with --shamefully-hoist,
          # pnpm does NOT create a flat node_modules/babel-preset-expo symlink
          # because it considers the preset an internal dep of the expo package,
          # not a hoistable workspace dep.
          #
          # When Gradle spawns node for Metro bundler, Babel looks for
          # babel-preset-expo starting from the app directory. Without a direct
          # symlink there (or in any parent up to the filesystem root), it fails.
          # NODE_PATH tricks don't help because there is no flat copy to point at.
          #
          # Fix: install babel-preset-expo directly into the app's node_modules
          # using npm --no-save (no package.json modification). Metro/Babel then
          # finds it via standard upward directory traversal.
          echo "Ensuring babel-preset-expo is resolvable from app directory..."
          cd "$APP_ABS"
          if ! node -e "require.resolve('babel-preset-expo')" 2>/dev/null; then
            echo "babel-preset-expo not found — installing locally..."
            npm install --no-save babel-preset-expo
            echo "babel-preset-expo installed."
          else
            echo "babel-preset-expo already resolvable — skipping."
          fi

      - name: Expo prebuild (generate Android project)
        script: |
          set -e
          APP_DIR=$(find . -maxdepth 5 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          cd "$APP_DIR"
          pnpm exec expo prebuild --platform android --clean --no-install

      - name: Set Android SDK path
        script: |
          APP_DIR=$(find . -maxdepth 5 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$APP_DIR/android/local.properties"

      - name: Configure release keystore
        script: |
          set -e
          APP_DIR=$(find . -maxdepth 5 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          ANDROID_DIR="$APP_DIR/android"
          APP_GRADLE="$ANDROID_DIR/app/build.gradle"

          echo "Decoding keystore into $ANDROID_DIR/app/release.keystore"
          echo "$CM_KEYSTORE" | base64 --decode > "$ANDROID_DIR/app/release.keystore"

          cat >> "$ANDROID_DIR/gradle.properties" << PROPS
          MYAPP_RELEASE_STORE_FILE=release.keystore
          MYAPP_RELEASE_KEY_ALIAS=${CM_KEY_ALIAS}
          MYAPP_RELEASE_STORE_PASSWORD=${CM_KEYSTORE_PASSWORD}
          MYAPP_RELEASE_KEY_PASSWORD=${CM_KEY_PASSWORD}
          PROPS

          node -e "
            const fs = require('fs');
            const file = '$APP_GRADLE';
            let src = fs.readFileSync(file, 'utf8');
            const block = \`
              release {
                  storeFile file(MYAPP_RELEASE_STORE_FILE)
                  storePassword MYAPP_RELEASE_STORE_PASSWORD
                  keyAlias MYAPP_RELEASE_KEY_ALIAS
                  keyPassword MYAPP_RELEASE_KEY_PASSWORD
              }\`;
            if (!src.includes('MYAPP_RELEASE_STORE_FILE')) {
              src = src.replace(/signingConfigs\s*\{/, 'signingConfigs {' + block);
            }
            src = src.replace(/signingConfig signingConfigs\.debug/g, 'signingConfig signingConfigs.release');
            fs.writeFileSync(file, src);
            console.log('build.gradle patched.');
          "

      - name: Build release APK
        script: |
          set -e
          APP_DIR=$(find . -maxdepth 5 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          APP_ABS=$(cd "$APP_DIR" && pwd)
          echo "Building APK for app at: $APP_ABS"

          export NODE_ENV=production
          cd "$APP_ABS/android"
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

    artifacts:
      - "**/app/build/outputs/apk/**/*.apk"

    publishing:
      scripts:
        - name: Upload APK to Supabase
          script: |
            set -e

            if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ] || [ -z "$SUPABASE_BUCKET" ]; then
              echo "Supabase vars not set — skipping upload."
              exit 0
            fi

            APK=$(find . -path "*/app/build/outputs/apk/*.apk" -o \
                         -path "*/app/build/outputs/apk/**/*.apk" 2>/dev/null | head -1)
            if [ -z "$APK" ]; then echo "No APK found!"; exit 1; fi

            APP_JSON=$(find . -maxdepth 5 -name "app.json" \
              -exec grep -l '"expo"' {} \; 2>/dev/null | head -1)
            VERSION=$(node -e "console.log(require('$APP_JSON').expo.version)")
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            VERSIONED="flashlight-strobe-v${VERSION}-${TIMESTAMP}.apk"
            LATEST="flashlight-strobe-latest.apk"

            upload() {
              HTTP=$(curl -fsSL -o /dev/null -w "%{http_code}" \
                -X POST \
                "${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/$1?upsert=true" \
                -H "Authorization: Bearer ${SUPABASE_KEY}" \
                -H "Content-Type: application/octet-stream" \
                -H "x-upsert: true" \
                --data-binary @"${APK}")
              echo "$1 -> HTTP $HTTP"
              [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || exit 1
            }

            upload "$VERSIONED"
            upload "$LATEST"

            echo "Done: ${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${LATEST}"
            echo "Update remote config: latestApkVersion=${VERSION}"
