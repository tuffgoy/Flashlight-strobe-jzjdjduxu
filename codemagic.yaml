workflows:
  android-apk:
    name: Flashlight Strobe - Release APK
    max_build_duration: 90
    environment:
      java: 17
      node: 20.17.0
      groups:
        - SUPABASE
        - CM
      vars:
        COREPACK_ENABLE_STRICT: "0"
        WORKSPACE_DIR: flashlight-strobe-github
        APP_SUBDIR: flashlight-strobe
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - $HOME/.cache/pnpm

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Show repo structure
        script: |
          echo "=== pwd ===" && pwd
          echo "=== root ===" && ls -la
          find . -maxdepth 5 -name "pnpm-workspace.yaml" 2>/dev/null
          find . -maxdepth 5 -name "app.json" 2>/dev/null
          node --version
          java -version

      - name: Install pnpm
        script: |
          corepack disable || true
          npm install -g pnpm@9 --force
          pnpm --version

      - name: Patch workspace config
        script: |
          cd "$WORKSPACE_DIR"

          sed -i 's|  - artifacts/\*|  - flashlight-strobe|' pnpm-workspace.yaml
          sed -i '/^  - lib\/\*/d' pnpm-workspace.yaml
          sed -i '/^  - lib\/integrations\/\*/d' pnpm-workspace.yaml
          sed -i '/^  - scripts/d' pnpm-workspace.yaml
          echo "pnpm-workspace.yaml packages:"
          grep -A4 "^packages:" pnpm-workspace.yaml

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('$APP_SUBDIR/package.json', 'utf8'));
            delete (pkg.devDependencies || {})['@workspace/api-client-react'];
            fs.writeFileSync('$APP_SUBDIR/package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('package.json: removed @workspace/api-client-react');
          "

      - name: Patch iOS-only source files for Android build
        script: |
          cd "$WORKSPACE_DIR/$APP_SUBDIR"

          # Write Android-safe _layout.tsx using heredoc (avoids YAML parsing issues)
          cat > "app/(tabs)/_layout.tsx" << 'EOFILE'
import React from 'react';
import { Platform, StyleSheet, useColorScheme, View } from 'react-native';
import { Feather } from '@expo/vector-icons';
import { BlurView } from 'expo-blur';
import { Tabs } from 'expo-router';
import { useColors } from '@/hooks/useColors';

export default function TabLayout() {
  const colors = useColors();
  const colorScheme = useColorScheme();
  const isDark = colorScheme === 'dark';
  const isIOS = Platform.OS === 'ios';
  const isWeb = Platform.OS === 'web';

  return (
    <Tabs
      screenOptions={{
        tabBarActiveTintColor: colors.primary,
        tabBarInactiveTintColor: colors.mutedForeground,
        headerShown: true,
        headerStyle: { backgroundColor: colors.background },
        headerTitleStyle: {
          color: colors.foreground,
          fontFamily: 'Inter_700Bold',
          letterSpacing: 2,
          fontSize: 13,
        },
        headerTintColor: colors.foreground,
        tabBarStyle: {
          position: 'absolute',
          backgroundColor: isIOS ? 'transparent' : colors.background,
          borderTopWidth: 1,
          borderTopColor: colors.border,
          elevation: 0,
          height: isWeb ? 84 : undefined,
        },
        tabBarLabelStyle: {
          fontFamily: 'Inter_500Medium',
          fontSize: 10,
          letterSpacing: 0.5,
        },
        tabBarBackground: () =>
          isIOS ? (
            <BlurView intensity={100} tint="dark" style={StyleSheet.absoluteFill} />
          ) : isWeb ? (
            <View style={[StyleSheet.absoluteFill, { backgroundColor: colors.background }]} />
          ) : null,
      }}
    >
      <Tabs.Screen
        name="index"
        options={{
          title: 'STROBE',
          tabBarLabel: 'Strobe',
          tabBarIcon: ({ color }) => <Feather name="zap" size={20} color={color} />,
        }}
      />
      <Tabs.Screen
        name="patterns"
        options={{
          title: 'PATTERNS',
          tabBarLabel: 'Patterns',
          tabBarIcon: ({ color }) => <Feather name="grid" size={20} color={color} />,
        }}
      />
      <Tabs.Screen
        name="settings"
        options={{
          title: 'SETTINGS',
          tabBarLabel: 'Settings',
          tabBarIcon: ({ color }) => <Feather name="settings" size={20} color={color} />,
        }}
      />
    </Tabs>
  );
}
EOFILE
          echo "_layout.tsx: rewritten without iOS-only imports"

          # Remove broken tsconfig reference to api-client-react
          node -e "
            const fs = require('fs');
            const ts = JSON.parse(fs.readFileSync('tsconfig.json', 'utf8'));
            ts.references = (ts.references || []).filter(function(r) {
              return r.path.indexOf('api-client-react') === -1;
            });
            fs.writeFileSync('tsconfig.json', JSON.stringify(ts, null, 2) + '\n');
            console.log('tsconfig.json: removed broken api-client-react reference');
          "

          # Disable experimental React Compiler (can crash Metro on complex hooks)
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            if (app.expo && app.expo.experiments) {
              app.expo.experiments.reactCompiler = false;
            }
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
            console.log('app.json: reactCompiler disabled');
          "

      - name: Install JS dependencies
        script: |
          cd "$WORKSPACE_DIR"
          pnpm install --no-frozen-lockfile

      - name: Expo prebuild — generate Android native project
        script: |
          cd "$WORKSPACE_DIR/$APP_SUBDIR"
          pnpm exec expo prebuild --platform android --clean --no-install

      - name: Set Android SDK path
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$WORKSPACE_DIR/$APP_SUBDIR/android/local.properties"

      - name: Configure release keystore
        script: |
          ANDROID_DIR="$WORKSPACE_DIR/$APP_SUBDIR/android"
          APP_GRADLE="$ANDROID_DIR/app/build.gradle"

          echo "Decoding keystore..."
          echo "$CM_KEYSTORE" | base64 --decode > "$ANDROID_DIR/app/release.keystore"

          cat >> "$ANDROID_DIR/gradle.properties" << PROPS
          MYAPP_RELEASE_STORE_FILE=release.keystore
          MYAPP_RELEASE_KEY_ALIAS=${CM_KEY_ALIAS}
          MYAPP_RELEASE_STORE_PASSWORD=${CM_KEYSTORE_PASSWORD}
          MYAPP_RELEASE_KEY_PASSWORD=${CM_KEY_PASSWORD}
          PROPS

          node -e "
            const fs = require('fs');
            const file = '$APP_GRADLE';
            let src = fs.readFileSync(file, 'utf8');
            const block = '\n              release {\n                  storeFile file(MYAPP_RELEASE_STORE_FILE)\n                  storePassword MYAPP_RELEASE_STORE_PASSWORD\n                  keyAlias MYAPP_RELEASE_KEY_ALIAS\n                  keyPassword MYAPP_RELEASE_KEY_PASSWORD\n              }';
            if (!src.includes('MYAPP_RELEASE_STORE_FILE')) {
              src = src.replace(/signingConfigs\s*\{/, 'signingConfigs {' + block);
            }
            src = src.replace(/signingConfig signingConfigs\.debug/g, 'signingConfig signingConfigs.release');
            fs.writeFileSync(file, src);
            console.log('build.gradle patched.');
          "

      - name: Build release APK
        script: |
          cd "$WORKSPACE_DIR/$APP_SUBDIR/android"
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tail -150

    artifacts:
      - "**/app/build/outputs/apk/**/*.apk"

    publishing:
      scripts:
        - name: Upload APK to Supabase
          script: |
            set -e

            if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ] || [ -z "$SUPABASE_BUCKET" ]; then
              echo "Supabase vars not set — skipping upload."
              exit 0
            fi

            APK=$(find . -path "*/app/build/outputs/apk/release/*.apk" 2>/dev/null | head -1)
            if [ -z "$APK" ]; then echo "No APK found!"; exit 1; fi

            APP_JSON="$WORKSPACE_DIR/$APP_SUBDIR/app.json"
            VERSION=$(node -e "console.log(require('./$APP_JSON').expo.version)")
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            VERSIONED="flashlight-strobe-v${VERSION}-${TIMESTAMP}.apk"
            LATEST="flashlight-strobe-latest.apk"

            upload() {
              HTTP=$(curl -fsSL -o /dev/null -w "%{http_code}" \
                -X POST \
                "${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/$1?upsert=true" \
                -H "Authorization: Bearer ${SUPABASE_KEY}" \
                -H "Content-Type: application/octet-stream" \
                -H "x-upsert: true" \
                --data-binary @"${APK}")
              echo "$1 -> HTTP $HTTP"
              [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || exit 1
            }

            upload "$VERSIONED"
            upload "$LATEST"

            echo "Done: ${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${LATEST}"
            echo "Update remote config: latestApkVersion=${VERSION}"
