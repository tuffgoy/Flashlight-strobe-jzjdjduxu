workflows:
  android-apk:
    name: Flashlight Strobe - Release APK
    max_build_duration: 90
    environment:
      java: 17
      groups:
        - SUPABASE
        - CM
      vars:
        COREPACK_ENABLE_STRICT: "0"
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - $HOME/.cache/pnpm
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install pnpm
        script: npm install -g pnpm@9 --force

      - name: Install JS dependencies
        script: |
          set -e
          REPO_ROOT=$(pwd)
          APP_NM="$REPO_ROOT/flashlight-strobe-github/flashlight-strobe/node_modules"
          cd flashlight-strobe-github
          pnpm install --no-frozen-lockfile --shamefully-hoist
          # babel-preset-expo is not declared in the app's package.json but
          # babel.config.js requires it. pnpm isolates it inside .pnpm/ so
          # Babel cannot find it. Install in a temp dir then copy to app's
          # node_modules (can't run npm install in the app dir — package.json
          # has catalog: entries that npm doesn't understand).
          mkdir -p /tmp/bpe && cd /tmp/bpe
          npm init -y > /dev/null 2>&1
          npm install babel-preset-expo --legacy-peer-deps --no-package-lock
          mkdir -p "$APP_NM"
          cp -r node_modules/babel-preset-expo "$APP_NM/"

      - name: Expo prebuild
        script: |
          set -e
          cd flashlight-strobe-github/flashlight-strobe
          pnpm exec expo prebuild --platform android --clean --no-install

      - name: Fix metro config
        script: |
          set -e
          # Write metro.config.js with a pnpm-aware transformIgnorePatterns regex.
          # Done AFTER prebuild (safety) and via base64 decode (no escaping issues).
          # Uses base64 -D (macOS/BSD flag) — not -d or --decode which are Linux/GNU.
          #
          # Root cause of the hermesc "private properties are not supported" error:
          #   pnpm stores packages at node_modules/.pnpm/<pkg>@<ver>/node_modules/<pkg>/
          #   A standard Metro transformIgnorePatterns regex matches on the FIRST
          #   "node_modules/" and sees ".pnpm" next, so the negative lookahead
          #   passes and ALL pnpm packages are treated as ignored (not Babel-
          #   transformed). react-native-svg's private class fields survive into
          #   the bundle and hermesc rejects them.
          # Fix: the regex adds (.pnpm/[^/]+/node_modules/)? inside the lookahead
          #   so it correctly sees through the pnpm prefix to the real package name.
          printf '%s' '' \
            | base64 -D > flashlight-strobe-github/flashlight-strobe/metro.config.js
          grep -q 'pnpm' flashlight-strobe-github/flashlight-strobe/metro.config.js \
            && echo "metro.config.js written OK" \
            || { echo "ERROR: metro.config.js decode failed"; exit 1; }

      - name: Configure Android
        script: |
          set -e
          ANDROID_DIR=flashlight-strobe-github/flashlight-strobe/android
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$ANDROID_DIR/local.properties"
          echo "$CM_KEYSTORE" | base64 -D > "$ANDROID_DIR/app/release.keystore"
          cat >> "$ANDROID_DIR/gradle.properties" << PROPS
          MYAPP_RELEASE_STORE_FILE=release.keystore
          MYAPP_RELEASE_KEY_ALIAS=${CM_KEY_ALIAS}
          MYAPP_RELEASE_STORE_PASSWORD=${CM_KEYSTORE_PASSWORD}
          MYAPP_RELEASE_KEY_PASSWORD=${CM_KEY_PASSWORD}
          PROPS
          node -e "
            var fs = require('fs');
            var file = '$ANDROID_DIR/app/build.gradle';
            var src = fs.readFileSync(file, 'utf8');
            if (!src.includes('MYAPP_RELEASE_STORE_FILE')) {
              src = src.replace(/signingConfigs\s*\{/, 'signingConfigs {\n        release {\n            storeFile file(MYAPP_RELEASE_STORE_FILE)\n            storePassword MYAPP_RELEASE_STORE_PASSWORD\n            keyAlias MYAPP_RELEASE_KEY_ALIAS\n            keyPassword MYAPP_RELEASE_KEY_PASSWORD\n        }');
            }
            src = src.replace(/signingConfig signingConfigs\.debug/g, 'signingConfig signingConfigs.release');
            fs.writeFileSync(file, src);
          "

      - name: Build release APK
        script: |
          set -e
          cd flashlight-strobe-github/flashlight-strobe/android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

    artifacts:
      - "**/app/build/outputs/apk/**/*.apk"

    publishing:
      scripts:
        - name: Upload to Supabase
          script: |
            set -e
            APK=$(find . -path "*/app/build/outputs/apk/**/*.apk" | head -1)
            [ -z "$APK" ] && { echo "No APK found"; exit 1; }
            VERSION=$(node -e "console.log(require('./flashlight-strobe-github/flashlight-strobe/app.json').expo.version)")
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            for NAME in "flashlight-strobe-v${VERSION}-${TIMESTAMP}.apk" "flashlight-strobe-latest.apk"; do
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                "${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/${NAME}?upsert=true" \
                -H "Authorization: Bearer ${SUPABASE_KEY}" \
                -H "Content-Type: application/octet-stream" \
                -H "x-upsert: true" \
                --data-binary @"$APK")
              echo "$NAME -> HTTP $HTTP"
              [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || exit 1
            done
