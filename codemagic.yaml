workflows:
  android-apk:
    name: Flashlight Strobe - Release APK
    max_build_duration: 90
    environment:
      java: 17
      groups:
        - SUPABASE
        - CM
      vars:
        COREPACK_ENABLE_STRICT: "0"
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - $HOME/.cache/pnpm

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      # ── 1. pnpm ────────────────────────────────────────────────────────────
      - name: Install pnpm
        script: |
          corepack disable || true
          npm install -g pnpm@9 --force
          pnpm --version

      # ── 2. JS dependencies ─────────────────────────────────────────────────
      #
      # IMPORTANT: The repo root has a separate package.json that is NOT the
      # Expo project. The actual pnpm workspace lives in flashlight-strobe-github/.
      # We must cd there before running any pnpm commands.
      - name: Install JS dependencies
        script: |
          set -e

          # Capture repo root BEFORE any cd — used for absolute paths later.
          REPO_ROOT=$(pwd)
          APP_NM="$REPO_ROOT/flashlight-strobe-github/flashlight-strobe/node_modules"

          # The pnpm workspace root — this is where pnpm-workspace.yaml lives.
          cd flashlight-strobe-github

          # Install everything in the workspace (flashlight-strobe member + root deps).
          # --shamefully-hoist puts all packages flat in node_modules so tools
          # that do upward require() resolution can find them.
          pnpm install --no-frozen-lockfile --shamefully-hoist

          # ── babel-preset-expo fix ──────────────────────────────────────────
          # babel.config.js requires babel-preset-expo, but it is NOT listed
          # in the app's package.json devDependencies. pnpm's module isolation
          # means it lives only inside the .pnpm virtual store, unreachable by
          # Babel when Metro's jest-worker spawns node subprocesses during
          # createBundleReleaseJsAndAssets.
          #
          # We cannot run `npm install` inside the app directory because its
          # package.json uses pnpm catalog: references (e.g. "react": "catalog:")
          # that npm does not understand — it throws EUNSUPPORTEDPROTOCOL.
          #
          # Solution: install babel-preset-expo in a clean temp directory that
          # has no package.json with catalog: entries, then copy the resulting
          # package folder into the app's own node_modules. Node/Metro resolves
          # modules by walking up from the file's directory, so
          # flashlight-strobe/node_modules/babel-preset-expo/ is found first.
          echo "Installing babel-preset-expo via temp dir (avoids catalog: protocol)..."
          mkdir -p /tmp/bpe-install
          cd /tmp/bpe-install
          npm init -y > /dev/null 2>&1
          npm install babel-preset-expo --legacy-peer-deps --no-package-lock
          mkdir -p "$APP_NM"
          cp -r /tmp/bpe-install/node_modules/babel-preset-expo "$APP_NM/"
          echo "Installed — $APP_NM/babel-preset-expo"
          cd "$REPO_ROOT"

      # ── 3. Generate native Android project ─────────────────────────────────
      - name: Expo prebuild
        script: |
          set -e
          cd flashlight-strobe-github/flashlight-strobe
          pnpm exec expo prebuild --platform android --clean --no-install

      # ── 4. Android SDK path ────────────────────────────────────────────────
      - name: Set Android SDK path
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" \
            > flashlight-strobe-github/flashlight-strobe/android/local.properties

      # ── 5. Release signing ─────────────────────────────────────────────────
      - name: Configure release keystore
        script: |
          set -e
          ANDROID_DIR="flashlight-strobe-github/flashlight-strobe/android"

          echo "Decoding keystore..."
          echo "$CM_KEYSTORE" | base64 --decode > "$ANDROID_DIR/app/release.keystore"

          cat >> "$ANDROID_DIR/gradle.properties" << PROPS
          MYAPP_RELEASE_STORE_FILE=release.keystore
          MYAPP_RELEASE_KEY_ALIAS=${CM_KEY_ALIAS}
          MYAPP_RELEASE_STORE_PASSWORD=${CM_KEYSTORE_PASSWORD}
          MYAPP_RELEASE_KEY_PASSWORD=${CM_KEY_PASSWORD}
          PROPS

          node -e "
            const fs = require('fs');
            const file = '$ANDROID_DIR/app/build.gradle';
            let src = fs.readFileSync(file, 'utf8');
            if (!src.includes('MYAPP_RELEASE_STORE_FILE')) {
              src = src.replace(
                /signingConfigs\s*\{/,
                'signingConfigs {\n        release {\n            storeFile file(MYAPP_RELEASE_STORE_FILE)\n            storePassword MYAPP_RELEASE_STORE_PASSWORD\n            keyAlias MYAPP_RELEASE_KEY_ALIAS\n            keyPassword MYAPP_RELEASE_KEY_PASSWORD\n        }'
              );
            }
            src = src.replace(/signingConfig signingConfigs\.debug/g, 'signingConfig signingConfigs.release');
            fs.writeFileSync(file, src);
            console.log('build.gradle patched.');
          "

      # ── 6. Build ───────────────────────────────────────────────────────────
      - name: Build release APK
        script: |
          set -e
          export NODE_ENV=production
          cd flashlight-strobe-github/flashlight-strobe/android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

    artifacts:
      - "**/app/build/outputs/apk/**/*.apk"

    publishing:
      scripts:
        - name: Upload APK to Supabase
          script: |
            set -e

            if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ] || [ -z "$SUPABASE_BUCKET" ]; then
              echo "Supabase vars not set — skipping upload."
              exit 0
            fi

            APK=$(find . -path "*/app/build/outputs/apk/**/*.apk" 2>/dev/null | head -1)
            if [ -z "$APK" ]; then echo "No APK found!"; exit 1; fi

            APP_JSON="flashlight-strobe-github/flashlight-strobe/app.json"
            VERSION=$(node -e "console.log(require('./$APP_JSON').expo.version)")
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            VERSIONED="flashlight-strobe-v${VERSION}-${TIMESTAMP}.apk"
            LATEST="flashlight-strobe-latest.apk"

            upload() {
              HTTP=$(curl -fsSL -o /dev/null -w "%{http_code}" \
                -X POST \
                "${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/$1?upsert=true" \
                -H "Authorization: Bearer ${SUPABASE_KEY}" \
                -H "Content-Type: application/octet-stream" \
                -H "x-upsert: true" \
                --data-binary @"${APK}")
              echo "$1 -> HTTP $HTTP"
              [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || exit 1
            }

            upload "$VERSIONED"
            upload "$LATEST"

            echo "APK: ${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${LATEST}"
