workflows:
  android-apk:
    name: Flashlight Strobe - Release APK
    max_build_duration: 90
    environment:
      java: 17
      node: 20.17.0
      groups:
        - SUPABASE
        - CM
      vars:
        COREPACK_ENABLE_STRICT: "0"
        WORKSPACE_DIR: flashlight-strobe-github
        APP_SUBDIR: flashlight-strobe
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - $HOME/.cache/pnpm

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Show repo structure
        script: |
          echo "=== pwd ===" && pwd
          echo "=== root ===" && ls -la
          find . -maxdepth 5 -name "pnpm-workspace.yaml" 2>/dev/null
          find . -maxdepth 5 -name "app.json" 2>/dev/null
          node --version
          java -version

      - name: Install pnpm
        script: |
          corepack disable || true
          npm install -g pnpm@9 --force
          pnpm --version

      - name: Patch workspace config
        script: |
          cd "$WORKSPACE_DIR"

          sed -i 's|  - artifacts/\*|  - flashlight-strobe|' pnpm-workspace.yaml
          sed -i '/^  - lib\/\*/d' pnpm-workspace.yaml
          sed -i '/^  - lib\/integrations\/\*/d' pnpm-workspace.yaml
          sed -i '/^  - scripts/d' pnpm-workspace.yaml
          echo "pnpm-workspace.yaml packages:"
          grep -A4 "^packages:" pnpm-workspace.yaml

          node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync('$APP_SUBDIR/package.json','utf8'));delete (pkg.devDependencies||{})['@workspace/api-client-react'];fs.writeFileSync('$APP_SUBDIR/package.json',JSON.stringify(pkg,null,2)+'\n');console.log('removed @workspace/api-client-react');"

      - name: Patch iOS-only source files for Android build
        script: |
          cd "$WORKSPACE_DIR/$APP_SUBDIR"

          echo  | base64 -d > "app/(tabs)/_layout.tsx"
          echo "_layout.tsx: rewritten without iOS-only imports"

          node -e "const fs=require('fs');const ts=JSON.parse(fs.readFileSync('tsconfig.json','utf8'));ts.references=(ts.references||[]).filter(function(r){return r.path.indexOf('api-client-react')===-1;});fs.writeFileSync('tsconfig.json',JSON.stringify(ts,null,2)+'\n');console.log('tsconfig.json: removed broken api-client-react reference');"

          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            if (app.expo) {
              if (app.expo.experiments) app.expo.experiments.reactCompiler = false;
              app.expo.newArchEnabled = false;
            }
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
            console.log('app.json patched: reactCompiler=false, newArchEnabled=false');
          "

      - name: Install JS dependencies
        script: |
          cd "$WORKSPACE_DIR"
          pnpm install --no-frozen-lockfile

      - name: Expo prebuild - generate Android native project
        script: |
          cd "$WORKSPACE_DIR/$APP_SUBDIR"
          pnpm exec expo prebuild --platform android --clean --no-install

      - name: Set Android SDK path
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$WORKSPACE_DIR/$APP_SUBDIR/android/local.properties"

      - name: Configure release keystore
        script: |
          ANDROID_DIR="$WORKSPACE_DIR/$APP_SUBDIR/android"
          APP_GRADLE="$ANDROID_DIR/app/build.gradle"

          echo "Decoding keystore..."
          echo "$CM_KEYSTORE" | base64 --decode > "$ANDROID_DIR/app/release.keystore"

          printf '\nMYAPP_RELEASE_STORE_FILE=release.keystore\nMYAPP_RELEASE_KEY_ALIAS=%s\nMYAPP_RELEASE_STORE_PASSWORD=%s\nMYAPP_RELEASE_KEY_PASSWORD=%s\n' "$CM_KEY_ALIAS" "$CM_KEYSTORE_PASSWORD" "$CM_KEY_PASSWORD" >> "$ANDROID_DIR/gradle.properties"

          node -e "const fs=require('fs');const file='$APP_GRADLE';let src=fs.readFileSync(file,'utf8');const block='\n              release {\n                  storeFile file(MYAPP_RELEASE_STORE_FILE)\n                  storePassword MYAPP_RELEASE_STORE_PASSWORD\n                  keyAlias MYAPP_RELEASE_KEY_ALIAS\n                  keyPassword MYAPP_RELEASE_KEY_PASSWORD\n              }';if(!src.includes('MYAPP_RELEASE_STORE_FILE')){src=src.replace(/signingConfigs\s*\{/,'signingConfigs {'+block);}src=src.replace(/signingConfig signingConfigs\.debug/g,'signingConfig signingConfigs.release');fs.writeFileSync(file,src);console.log('build.gradle patched.');"

          echo "=== Signing section in build.gradle ==="
          node -e "const fs=require('fs');const src=fs.readFileSync('$APP_GRADLE','utf8');const m=src.match(/signingConfigs[\s\S]{0,600}/);console.log(m?m[0].substring(0,600):'(signingConfigs not found - build.gradle may use Kotlin DSL)');"

      - name: Build release APK
        script: |
          cd "$WORKSPACE_DIR/$APP_SUBDIR/android"
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace > /tmp/gradle-build.log 2>&1
          BUILD_EXIT=$?
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== GRADLE FAILED (exit $BUILD_EXIT) — last 300 lines ==="
            tail -300 /tmp/gradle-build.log
            exit $BUILD_EXIT
          fi
          echo "=== Gradle succeeded ==="
          echo "=== APK locations ==="
          find . -name "*.apk" 2>/dev/null || echo "No APKs found"

      - name: Upload APK to Supabase
        script: |
          set -e

          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ] || [ -z "$SUPABASE_BUCKET" ]; then
            echo "Supabase vars not set -- skipping upload."
            exit 0
          fi

          RELEASE_DIR="$WORKSPACE_DIR/$APP_SUBDIR/android/app/build/outputs/apk/release"
          APK=$(ls "$RELEASE_DIR"/*.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found in $RELEASE_DIR"
            ls "$RELEASE_DIR" 2>/dev/null || echo "(directory missing)"
            exit 1
          fi
          echo "Uploading: $APK"

          APP_JSON="$WORKSPACE_DIR/$APP_SUBDIR/app.json"
          VERSION=$(node -e "console.log(require('./$APP_JSON').expo.version)")
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          VERSIONED="flashlight-strobe-v${VERSION}-${TIMESTAMP}.apk"
          LATEST="flashlight-strobe-latest.apk"

          upload() {
            HTTP=$(curl -fsSL -o /dev/null -w "%{http_code}" \
              -X POST \
              "${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/$1?upsert=true" \
              -H "Authorization: Bearer ${SUPABASE_KEY}" \
              -H "Content-Type: application/octet-stream" \
              -H "x-upsert: true" \
              --data-binary @"${APK}")
            echo "$1 -> HTTP $HTTP"
            [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || exit 1
          }

          upload "$VERSIONED"
          upload "$LATEST"

          echo "Done: ${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${LATEST}"

    artifacts:
      - "**/app/build/outputs/apk/**/*.apk"
