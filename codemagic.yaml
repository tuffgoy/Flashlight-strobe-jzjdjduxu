workflows:
  android-apk:
    name: Build Release APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
      node: 20.17.0
      groups:
        - CM        # CM_KEYSTORE, CM_KEY_ALIAS, CM_KEYSTORE_PASSWORD, CM_KEY_PASSWORD
        - SUPABASE  # SUPABASE_URL, SUPABASE_KEY, SUPABASE_BUCKET

    scripts:
      - name: Ensure pnpm 9
        script: |
          # Codemagic Mac images ship with pnpm pre-installed; skip reinstall if present
          pnpm --version | grep -q '^9\.' && echo "pnpm 9 already installed" && exit 0
          npm install -g pnpm@9 --force

      - name: Install JS deps
        script: |
          REPO_ROOT=$(pwd)
          cd "$REPO_ROOT/flashlight-strobe-github"
          # --shamefully-hoist so Metro can resolve all hoisted packages
          pnpm install --no-frozen-lockfile --shamefully-hoist

      - name: Expo prebuild
        script: |
          REPO_ROOT=$(pwd)
          # cd INTO the app dir — pnpm exec resolves binaries correctly when run
          # from inside a workspace package directory (traverses up to workspace root .bin)
          cd "$REPO_ROOT/flashlight-strobe-github/flashlight-strobe"
          pnpm exec expo prebuild --platform android --clean --no-install

      - name: Restore pnpm-aware metro.config.js (belt-and-suspenders)
        # expo prebuild may overwrite metro.config.js. Decode the committed
        # version from base64 to guarantee the pnpm-aware regex is always present.
        #
        # Bug 2+3 fix: react-native-svg@15.x uses ES2022 private class fields
        # (#x, #y, #width, #height). hermesc rejects them. Metro must transform
        # react-native-svg, but the standard transformIgnorePatterns regex fails
        # silently with pnpm because pnpm stores packages at:
        #   node_modules/.pnpm/<pkg>@<ver>_<hash>/node_modules/<pkg>/
        # The negative lookahead sees ".pnpm" (not in the allowlist) at the first
        # "node_modules/" and marks every package as ignored.
        # The fix: add optional (\.pnpm\/[^/]+\/node_modules\/)? inside the lookahead.
        script: |
          REPO_ROOT=$(pwd)
          echo '' \
            | base64 -d > "$REPO_ROOT/flashlight-strobe-github/flashlight-strobe/metro.config.js"
          echo "metro.config.js restored — pnpm-aware transformIgnorePatterns in place"

      - name: Configure Android signing
        script: |
          REPO_ROOT=$(pwd)
          ANDROID_DIR="$REPO_ROOT/flashlight-strobe-github/flashlight-strobe/android"

          # local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$ANDROID_DIR/local.properties"

          # Decode keystore
          echo "$CM_KEYSTORE" | base64 -d > /tmp/release.keystore

          # Patch android/app/build.gradle to add release signing config
          python3 - "$ANDROID_DIR/app/build.gradle" <<'PYEOF'
          import sys, re

          path = sys.argv[1]
          text = open(path).read()

          signing_block = """
              signingConfigs {
                  release {
                      storeFile file('/tmp/release.keystore')
                      storePassword System.getenv('CM_KEYSTORE_PASSWORD')
                      keyAlias System.getenv('CM_KEY_ALIAS')
                      keyPassword System.getenv('CM_KEY_PASSWORD')
                  }
              }
          """

          # Insert signingConfigs before the buildTypes block (idempotent guard)
          if 'signingConfigs {' not in text:
              text = re.sub(r'(\s*buildTypes\s*\{)', signing_block + r'\1', text, count=1)

          # Point release buildType at the release signingConfig
          text = re.sub(
              r'(buildTypes\s*\{[^}]*release\s*\{[^}]*?)signingConfig\s+signingConfigs\.\w+',
              r'\1signingConfig signingConfigs.release',
              text,
              flags=re.DOTALL,
          )

          # If there was no existing signingConfig line inside release {}, add one
          if 'signingConfigs.release' not in text:
              text = re.sub(
                  r'(buildTypes\s*\{[^}]*release\s*\{)',
                  r'\1\n            signingConfig signingConfigs.release',
                  text,
                  flags=re.DOTALL,
              )

          open(path, 'w').write(text)
          print("build.gradle patched OK")
          PYEOF

      - name: Patch react-native-svg (hermesc private-field fix)
        # react-native-svg@15.x uses ES2022 private class fields (#x #y #width #height).
        # hermesc (Hermes AOT compiler) cannot compile them, even when Metro+Babel are
        # correctly configured — because metro-react-native-babel-preset intentionally
        # skips private-field transforms when targeting Hermes runtime.
        #
        # Fix: rewrite private class field syntax directly in the pnpm virtual-store
        # source before Gradle bundles them. `#name` → `_pvtname` everywhere in src/.
        # This is safe: all usages are internal to the class; no external code accesses them.
        script: |
          REPO_ROOT=$(pwd)
          # Write the patch script to a temp file to avoid heredoc escaping issues
          cat > /tmp/patch-rnssvg.js << 'JSEOF'
          const fs = require('fs'), path = require('path');
          const repoRoot = process.argv[2];
          const pnpmStore = path.join(repoRoot, 'flashlight-strobe-github', 'node_modules', '.pnpm');

          // Find react-native-svg in the pnpm virtual store
          let svgDir = null;
          for (const entry of fs.readdirSync(pnpmStore)) {
            if (entry.startsWith('react-native-svg@')) {
              const candidate = path.join(pnpmStore, entry, 'node_modules', 'react-native-svg');
              if (fs.existsSync(candidate)) { svgDir = candidate; break; }
            }
          }
          if (!svgDir) { console.log('react-native-svg not found in pnpm store — skipping'); process.exit(0); }
          console.log('Patching react-native-svg at:', svgDir);

          // Replace #fieldName → _pvtfieldName in all source files
          // Handles: `#x;`  `#x = val`  `this.#x`  `#method() {}`
          let patchCount = 0;
          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const p = path.join(dir, entry.name);
              if (entry.isDirectory()) { walk(p); continue; }
              if (!/\.(js|ts|tsx|mjs|cjs)$/.test(entry.name)) continue;
              const src = fs.readFileSync(p, 'utf8');
              // Replace every #identifier occurrence (field decl, field access, private method)
              const out = src.replace(/#([a-zA-Z_$][a-zA-Z0-9_$]*)/g, '_pvt$1');
              if (out !== src) {
                fs.writeFileSync(p, out);
                console.log('  patched:', entry.name);
                patchCount++;
              }
            }
          }
          walk(path.join(svgDir, 'src'));
          console.log('Done —', patchCount, 'file(s) patched');
          JSEOF
          node /tmp/patch-rnssvg.js "$REPO_ROOT"

      - name: Build release APK
        script: |
          REPO_ROOT=$(pwd)
          cd "$REPO_ROOT/flashlight-strobe-github/flashlight-strobe/android"
          ./gradlew assembleRelease --no-daemon

      - name: Upload to Supabase Storage
        script: |
          REPO_ROOT=$(pwd)
          APK="$REPO_ROOT/flashlight-strobe-github/flashlight-strobe/android/app/build/outputs/apk/release/app-release.apk"

          # Read version from app.json
          VERSION=$(python3 -c "import json; d=json.load(open('$REPO_ROOT/flashlight-strobe-github/flashlight-strobe/app.json')); print(d['expo']['version'])")
          echo "Uploading APK version: $VERSION"

          # Upload versioned copy (POST — creates new object)
          curl -fsSL -X POST \
            "$SUPABASE_URL/storage/v1/object/$SUPABASE_BUCKET/flashlight-strobe-v${VERSION}.apk" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$APK"

          # Upload / overwrite latest (upsert)
          curl -fsSL -X POST \
            "$SUPABASE_URL/storage/v1/object/$SUPABASE_BUCKET/flashlight-strobe-latest.apk" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "x-upsert: true" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$APK"

          echo "Upload complete — flashlight-strobe-v${VERSION}.apk + flashlight-strobe-latest.apk"

    artifacts:
      - flashlight-strobe-github/flashlight-strobe/android/app/build/outputs/apk/release/app-release.apk
