workflows:
  android-apk:
    name: Flashlight Strobe - Release APK
    max_build_duration: 90
    environment:
      java: 17
      android_signing:
        - flashlight_keystore
      groups:
        - SUPABASE
        - CM
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - $HOME/.cache/pnpm

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm@9 --force
          pnpm --version

      - name: Install JS dependencies
        script: |
          pnpm install --frozen-lockfile

      - name: Expo prebuild (generate Android project)
        script: |
          cd artifacts/flashlight-strobe
          npx expo prebuild --platform android --clean --no-install

      - name: Set Android SDK path
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > artifacts/flashlight-strobe/android/local.properties

      - name: Build signed release APK
        script: |
          cd artifacts/flashlight-strobe/android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$CM_KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$CM_KEY_PASSWORD"

    artifacts:
      - artifacts/flashlight-strobe/android/app/build/outputs/apk/**/*.apk

    publishing:
      scripts:
        - name: Upload APK to Supabase
          script: |
            set -e

            if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ] || [ -z "$SUPABASE_BUCKET" ]; then
              echo "Supabase vars not set — skipping upload."
              exit 0
            fi

            APK=$(find artifacts/flashlight-strobe/android/app/build/outputs/apk -name "*.apk" | head -1)
            if [ -z "$APK" ]; then echo "No APK found!"; exit 1; fi

            VERSION=$(node -e "console.log(require('./artifacts/flashlight-strobe/app.json').expo.version)")
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            VERSIONED="flashlight-strobe-v${VERSION}-${TIMESTAMP}.apk"
            LATEST="flashlight-strobe-latest.apk"

            upload() {
              HTTP=$(curl -fsSL -o /dev/null -w "%{http_code}" \
                -X POST \
                "${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/$1?upsert=true" \
                -H "Authorization: Bearer ${SUPABASE_KEY}" \
                -H "Content-Type: application/octet-stream" \
                -H "x-upsert: true" \
                --data-binary @"${APK}")
              echo "$1 -> HTTP $HTTP"
              [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || exit 1
            }

            upload "$VERSIONED"
            upload "$LATEST"

            echo "Done. Latest APK: ${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${LATEST}"
            echo "Update remote config: latestApkVersion=${VERSION}"
