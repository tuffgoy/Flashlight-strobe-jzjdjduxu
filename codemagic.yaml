workflows:
  android-apk:
    name: Flashlight Strobe - Release APK
    max_build_duration: 90
    environment:
      java: 17
      groups:
        - SUPABASE
        - CM
      vars:
        COREPACK_ENABLE_STRICT: "0"
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - $HOME/.cache/pnpm

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Show repo structure
        script: |
          echo "=== Working directory ==="
          pwd
          echo "=== Root contents ==="
          ls -la
          echo "=== All app.json files found ==="
          find . -maxdepth 4 -name "app.json" 2>/dev/null
          echo "=== All pnpm-workspace.yaml files found ==="
          find . -maxdepth 5 -name "pnpm-workspace.yaml" 2>/dev/null

      - name: Install pnpm
        script: |
          corepack disable || true
          npm install -g pnpm@latest --force
          pnpm --version

      - name: Install JS dependencies
        script: |
          set -e
          APP_DIR=$(find . -maxdepth 4 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          APP_ABS=$(cd "$APP_DIR" && pwd)
          echo "Expo app found at: $APP_ABS"

          WORKSPACE_YAML=$(find . -maxdepth 5 -name "pnpm-workspace.yaml" 2>/dev/null | head -1)
          WORKSPACE_ROOT=$(dirname "$WORKSPACE_YAML")
          WORKSPACE_ABS=$(cd "$WORKSPACE_ROOT" && pwd)
          echo "Found pnpm workspace root at: $WORKSPACE_ABS"

          cd "$WORKSPACE_ABS"
          pnpm install --no-frozen-lockfile

          echo "=== Verifying expo was installed ==="
          if [ ! -e "$APP_ABS/node_modules/.bin/expo" ] && [ ! -e "$WORKSPACE_ABS/node_modules/.bin/expo" ]; then
            echo "ERROR: expo binary not found in app or workspace node_modules"
            exit 1
          fi
          echo "Dependencies installed successfully"

      - name: Patch metro.config.js for pnpm workspace
        script: |
          set -e
          APP_DIR=$(find . -maxdepth 4 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          APP_ABS=$(cd "$APP_DIR" && pwd)

          WORKSPACE_YAML=$(find . -maxdepth 5 -name "pnpm-workspace.yaml" 2>/dev/null | head -1)
          WORKSPACE_ABS=$(cd "$(dirname "$WORKSPACE_YAML")" && pwd)

          METRO_CONFIG="$APP_ABS/metro.config.js"
          echo "Writing pnpm-aware metro.config.js to $METRO_CONFIG"

          node -e '
            var fs = require("fs");
            var path = require("path");
            var appAbs = process.env.APP_ABS;
            var workspaceAbs = process.env.WORKSPACE_ABS;
            var config = [
              "const { getDefaultConfig } = require(\"expo/metro-config\");",
              "const path = require(\"path\");",
              "",
              "const projectRoot = __dirname;",
              "const workspaceRoot = " + JSON.stringify(workspaceAbs) + ";",
              "",
              "const config = getDefaultConfig(projectRoot);",
              "",
              "// Tell Metro to watch the pnpm workspace root so it can find",
              "// packages hoisted there instead of in the app node_modules.",
              "config.watchFolders = [workspaceRoot];",
              "",
              "config.resolver.nodeModulesPaths = [",
              "  path.resolve(projectRoot, \"node_modules\"),",
              "  path.resolve(workspaceRoot, \"node_modules\"),",
              "];",
              "",
              "// pnpm uses symlinks; enable symlink resolution in Metro.",
              "config.resolver.unstable_enableSymlinks = true;",
              "",
              "module.exports = config;",
            ].join("\n");
            fs.writeFileSync(path.join(appAbs, "metro.config.js"), config);
            console.log("metro.config.js written");
          ' APP_ABS="$APP_ABS" WORKSPACE_ABS="$WORKSPACE_ABS"

          echo "--- metro.config.js ---"
          cat "$METRO_CONFIG"

      - name: Expo prebuild (generate Android project)
        script: |
          set -e
          APP_DIR=$(find . -maxdepth 4 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          echo "Running prebuild in: $APP_DIR"
          cd "$APP_DIR"
          pnpm exec expo prebuild --platform android --clean --no-install

      - name: Set Android SDK path
        script: |
          APP_DIR=$(find . -maxdepth 4 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$APP_DIR/android/local.properties"

      - name: Configure release keystore
        script: |
          set -e
          APP_DIR=$(find . -maxdepth 4 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          ANDROID_DIR="$APP_DIR/android"
          APP_GRADLE="$ANDROID_DIR/app/build.gradle"

          if [ -z "$CM_KEYSTORE" ]; then
            echo "No keystore — will build debug APK"
            exit 0
          fi

          echo "$CM_KEYSTORE" | base64 --decode > "$ANDROID_DIR/app/release.keystore"

          printf 'MYAPP_RELEASE_STORE_FILE=release.keystore\n' >> "$ANDROID_DIR/gradle.properties"
          printf 'MYAPP_RELEASE_KEY_ALIAS=%s\n' "$CM_KEY_ALIAS" >> "$ANDROID_DIR/gradle.properties"
          printf 'MYAPP_RELEASE_STORE_PASSWORD=%s\n' "$CM_KEYSTORE_PASSWORD" >> "$ANDROID_DIR/gradle.properties"
          printf 'MYAPP_RELEASE_KEY_PASSWORD=%s\n' "$CM_KEY_PASSWORD" >> "$ANDROID_DIR/gradle.properties"

          export APP_GRADLE
          node -e '
            var fs = require("fs");
            var f = process.env.APP_GRADLE;
            var s = fs.readFileSync(f, "utf8");
            var block = "\n        release {\n            storeFile file(MYAPP_RELEASE_STORE_FILE)\n            storePassword MYAPP_RELEASE_STORE_PASSWORD\n            keyAlias MYAPP_RELEASE_KEY_ALIAS\n            keyPassword MYAPP_RELEASE_KEY_PASSWORD\n        }";
            if (s.indexOf("MYAPP_RELEASE_STORE_FILE") === -1) {
              s = s.replace(/signingConfigs\s*\{/, "signingConfigs {" + block);
            }
            s = s.replace(/signingConfig signingConfigs\.debug/g, "signingConfig signingConfigs.release");
            fs.writeFileSync(f, s);
            console.log("build.gradle patched");
          '

      - name: Build release APK
        script: |
          set -e
          APP_DIR=$(find . -maxdepth 4 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          cd "$APP_DIR/android"
          chmod +x ./gradlew
          if [ -n "$CM_KEYSTORE" ]; then
            ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tail -100
          else
            ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -100
          fi

    artifacts:
      - "**/app/build/outputs/apk/**/*.apk"

    publishing:
      scripts:
        - name: Upload APK to Supabase
          script: |
            set -e

            if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ] || [ -z "$SUPABASE_BUCKET" ]; then
              echo "Supabase vars not set — skipping upload."
              exit 0
            fi

            APK=$(find . -path "*/app/build/outputs/apk/*.apk" -o \
                         -path "*/app/build/outputs/apk/**/*.apk" 2>/dev/null | head -1)
            if [ -z "$APK" ]; then echo "No APK found!"; exit 1; fi
            echo "Found APK: $APK"

            APP_JSON=$(find . -maxdepth 4 -name "app.json" \
              -exec grep -l '"expo"' {} \; 2>/dev/null | head -1)
            VERSION=$(node -e "console.log(require('$APP_JSON').expo.version)")
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            VERSIONED="flashlight-strobe-v${VERSION}-${TIMESTAMP}.apk"
            LATEST="flashlight-strobe-latest.apk"

            upload() {
              HTTP=$(curl -fsSL -o /dev/null -w "%{http_code}" \
                -X POST \
                "${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/$1?upsert=true" \
                -H "Authorization: Bearer ${SUPABASE_KEY}" \
                -H "Content-Type: application/octet-stream" \
                -H "x-upsert: true" \
                --data-binary @"${APK}")
              echo "$1 -> HTTP $HTTP"
              [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || exit 1
            }

            upload "$VERSIONED"
            upload "$LATEST"

            echo "Done: ${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${LATEST}"
            echo "Update remote config: latestApkVersion=${VERSION}"
