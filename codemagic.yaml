workflows:
  android-apk:
    name: Flashlight Strobe - Release APK
    max_build_duration: 90
    environment:
      java: 17
      node: 20.17.0
      groups:
        - SUPABASE
        - CM
      vars:
        COREPACK_ENABLE_STRICT: "0"
        WORKSPACE_DIR: flashlight-strobe-github
        APP_SUBDIR: flashlight-strobe
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - $HOME/.cache/pnpm

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Show repo structure
        script: |
          echo "=== pwd ===" && pwd
          echo "=== root ===" && ls -la
          find . -maxdepth 5 -name "pnpm-workspace.yaml" 2>/dev/null
          find . -maxdepth 5 -name "app.json" 2>/dev/null
          node --version
          java -version

      - name: Install pnpm
        script: |
          corepack disable || true
          npm install -g pnpm@9 --force
          pnpm --version

      - name: Patch workspace config
        script: |
          cd "$WORKSPACE_DIR"

          sed -i 's|  - artifacts/\*|  - flashlight-strobe|' pnpm-workspace.yaml
          sed -i '/^  - lib\/\*/d' pnpm-workspace.yaml
          sed -i '/^  - lib\/integrations\/\*/d' pnpm-workspace.yaml
          sed -i '/^  - scripts/d' pnpm-workspace.yaml
          echo "pnpm-workspace.yaml packages:"
          grep -A4 "^packages:" pnpm-workspace.yaml

          node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync('$APP_SUBDIR/package.json','utf8'));delete (pkg.devDependencies||{})['@workspace/api-client-react'];fs.writeFileSync('$APP_SUBDIR/package.json',JSON.stringify(pkg,null,2)+'\n');console.log('removed @workspace/api-client-react');"

      - name: Patch iOS-only source files for Android build
        script: |
          cd "$WORKSPACE_DIR/$APP_SUBDIR"

          echo  | base64 -d > "app/(tabs)/_layout.tsx"
          echo "_layout.tsx: rewritten without iOS-only imports"

          node -e "const fs=require('fs');const ts=JSON.parse(fs.readFileSync('tsconfig.json','utf8'));ts.references=(ts.references||[]).filter(function(r){return r.path.indexOf('api-client-react')===-1;});fs.writeFileSync('tsconfig.json',JSON.stringify(ts,null,2)+'\n');console.log('tsconfig.json: removed broken api-client-react reference');"

          node -e "const fs=require('fs');const app=JSON.parse(fs.readFileSync('app.json','utf8'));if(app.expo&&app.expo.experiments){app.expo.experiments.reactCompiler=false;}fs.writeFileSync('app.json',JSON.stringify(app,null,2)+'\n');console.log('app.json: reactCompiler disabled');"

      - name: Install JS dependencies
        script: |
          cd "$WORKSPACE_DIR"
          pnpm install --no-frozen-lockfile

      - name: Expo prebuild - generate Android native project
        script: |
          cd "$WORKSPACE_DIR/$APP_SUBDIR"
          pnpm exec expo prebuild --platform android --clean --no-install

      - name: Patch gradle.properties for Android compatibility
        script: |
          set -e
          GRADLE_PROPS="$WORKSPACE_DIR/$APP_SUBDIR/android/gradle.properties"
          echo "=== gradle.properties before patch ==="
          cat "$GRADLE_PROPS"
          echo ""

          # Disable New Architecture — react-native-worklets 0.5.1, expo-glass-effect,
          # and reanimated 4.x are not all fully compatible with New Arch on Android.
          # Switching to old arch produces a stable APK.
          if grep -q "newArchEnabled=true" "$GRADLE_PROPS"; then
            sed -i 's/newArchEnabled=true/newArchEnabled=false/' "$GRADLE_PROPS"
            echo "newArchEnabled: true -> false"
          elif grep -q "newArchEnabled" "$GRADLE_PROPS"; then
            sed -i 's/newArchEnabled=.*/newArchEnabled=false/' "$GRADLE_PROPS"
            echo "newArchEnabled: overridden to false"
          else
            echo "newArchEnabled=false" >> "$GRADLE_PROPS"
            echo "newArchEnabled=false appended"
          fi

          echo "=== Key gradle.properties values after patch ==="
          grep -E "newArchEnabled|hermesEnabled" "$GRADLE_PROPS" || true

      - name: Set Android SDK path
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$WORKSPACE_DIR/$APP_SUBDIR/android/local.properties"

      - name: Configure release keystore
        script: |
          set -e
          ANDROID_DIR="$WORKSPACE_DIR/$APP_SUBDIR/android"
          APP_GRADLE="$ANDROID_DIR/app/build.gradle"

          echo "Decoding keystore..."
          echo "$CM_KEYSTORE" | base64 --decode > "$ANDROID_DIR/app/release.keystore"
          ls -lh "$ANDROID_DIR/app/release.keystore"

          printf '\nMYAPP_RELEASE_STORE_FILE=release.keystore\nMYAPP_RELEASE_KEY_ALIAS=%s\nMYAPP_RELEASE_STORE_PASSWORD=%s\nMYAPP_RELEASE_KEY_PASSWORD=%s\n' \
            "$CM_KEY_ALIAS" "$CM_KEYSTORE_PASSWORD" "$CM_KEY_PASSWORD" >> "$ANDROID_DIR/gradle.properties"

          node -e "
            const fs = require('fs');
            const file = '$APP_GRADLE';
            let src = fs.readFileSync(file, 'utf8');

            // Inject release signing config block if not already present
            if (!src.includes('MYAPP_RELEASE_STORE_FILE')) {
              const block = '\n        release {\n            storeFile file(MYAPP_RELEASE_STORE_FILE)\n            storePassword MYAPP_RELEASE_STORE_PASSWORD\n            keyAlias MYAPP_RELEASE_KEY_ALIAS\n            keyPassword MYAPP_RELEASE_KEY_PASSWORD\n        }';
              if (src.match(/signingConfigs\s*\{/)) {
                src = src.replace(/signingConfigs\s*\{/, 'signingConfigs {' + block);
                console.log('Injected release signing config block.');
              } else {
                console.error('WARNING: signingConfigs block not found in build.gradle!');
              }
            } else {
              console.log('Release signing config already present, skipping injection.');
            }

            // Replace debug signing with release signing in buildTypes.
            // Handles both 'signingConfig signingConfigs.debug' and 'signingConfig = signingConfigs.debug'
            const before = src;
            src = src.replace(/signingConfig\s*=?\s*signingConfigs\.debug/g, 'signingConfig signingConfigs.release');
            const replaced = (src !== before);
            console.log('signingConfig lines replaced:', replaced);

            fs.writeFileSync(file, src);
            console.log('build.gradle patched successfully.');
          "

          echo "=== Signing config in build.gradle ==="
          grep -n -A 8 "signingConfigs" "$APP_GRADLE" || echo "(signingConfigs block not found)"
          echo "=== Release buildType signing ==="
          grep -n "signingConfig" "$APP_GRADLE" || echo "(no signingConfig lines found)"

      - name: Build release APK
        script: |
          set -e
          cd "$WORKSPACE_DIR/$APP_SUBDIR/android"
          chmod +x ./gradlew
          echo "Starting Gradle assembleRelease..."
          ./gradlew assembleRelease --no-daemon > /tmp/gradle.log 2>&1 || {
            echo ""
            echo "================================================================"
            echo "GRADLE BUILD FAILED — last 300 lines:"
            echo "================================================================"
            tail -300 /tmp/gradle.log
            echo "================================================================"
            exit 1
          }
          echo "=== Gradle build succeeded ==="
          echo "=== APK locations ==="
          find . -name "*.apk" 2>/dev/null || echo "WARNING: no APK files found"

      - name: Upload APK to Supabase
        script: |
          set -e

          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ] || [ -z "$SUPABASE_BUCKET" ]; then
            echo "Supabase vars not set -- skipping upload."
            exit 0
          fi

          RELEASE_DIR="$WORKSPACE_DIR/$APP_SUBDIR/android/app/build/outputs/apk/release"
          APK=$(ls "$RELEASE_DIR"/*.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found in $RELEASE_DIR"
            ls "$RELEASE_DIR" 2>/dev/null || echo "(directory missing)"
            exit 1
          fi
          echo "Uploading: $APK"

          APP_JSON="$WORKSPACE_DIR/$APP_SUBDIR/app.json"
          VERSION=$(node -e "console.log(require('./$APP_JSON').expo.version)")
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          VERSIONED="flashlight-strobe-v${VERSION}-${TIMESTAMP}.apk"
          LATEST="flashlight-strobe-latest.apk"

          upload() {
            HTTP=$(curl -fsSL -o /dev/null -w "%{http_code}" \
              -X POST \
              "${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/$1?upsert=true" \
              -H "Authorization: Bearer ${SUPABASE_KEY}" \
              -H "Content-Type: application/octet-stream" \
              -H "x-upsert: true" \
              --data-binary @"${APK}")
            echo "$1 -> HTTP $HTTP"
            [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || exit 1
          }

          upload "$VERSIONED"
          upload "$LATEST"

          echo "Done: ${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${LATEST}"

    artifacts:
      - "**/app/build/outputs/apk/**/*.apk"
