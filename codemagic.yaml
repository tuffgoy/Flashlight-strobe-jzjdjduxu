workflows:
  android-apk:
    name: Flashlight Strobe - Release APK
    max_build_duration: 90
    environment:
      java: 17
      groups:
        - SUPABASE
        - CM
      vars:
        COREPACK_ENABLE_STRICT: "0"
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - $HOME/.cache/pnpm

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Show repo structure
        script: |
          echo "=== Working directory ==="
          pwd
          echo "=== Root contents ==="
          ls -la
          echo "=== All app.json files found ==="
          find . -maxdepth 4 -name "app.json" 2>/dev/null
          echo "=== All pnpm-workspace.yaml files found ==="
          find . -maxdepth 5 -name "pnpm-workspace.yaml" 2>/dev/null

      - name: Install pnpm
        script: |
          corepack disable || true
          npm install -g pnpm@latest --force
          pnpm --version

      - name: Install JS dependencies
        script: |
          set -e
          APP_DIR=$(find . -maxdepth 4 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          APP_ABS=$(cd "$APP_DIR" && pwd)
          echo "Expo app found at: $APP_ABS"

          WORKSPACE_YAML=$(find . -maxdepth 5 -name "pnpm-workspace.yaml" 2>/dev/null | head -1)
          if [ -z "$WORKSPACE_YAML" ]; then
            echo "ERROR: no pnpm-workspace.yaml found. This package.json uses"
            echo "'catalog:' / 'workspace:*' specifiers which require one."
            exit 1
          fi

          WORKSPACE_ROOT=$(dirname "$WORKSPACE_YAML")
          WORKSPACE_ABS=$(cd "$WORKSPACE_ROOT" && pwd)
          echo "Found pnpm workspace root at: $WORKSPACE_ABS"
          echo "--- pnpm-workspace.yaml (before) ---"
          cat "$WORKSPACE_YAML"

          # Ask pnpm which directories it currently recognizes as workspace
          # members. If the app folder isn't among them, its deps (including
          # expo) are invisible to install no matter how many times we run it.
          RECOGNIZED=$(cd "$WORKSPACE_ABS" && pnpm -r exec -- pwd 2>/dev/null || true)
          echo "--- Workspace packages pnpm currently recognizes ---"
          echo "$RECOGNIZED"

          if ! echo "$RECOGNIZED" | grep -qF "$APP_ABS"; then
            echo "App folder is NOT a recognized pnpm workspace member. Patching pnpm-workspace.yaml..."
            if grep -q '^packages:' "$WORKSPACE_YAML"; then
              awk '{print} /^packages:/ && !done {print "  - \"*\""; print "  - \"packages/*\""; print "  - \"apps/*\""; done=1}' \
                "$WORKSPACE_YAML" > "$WORKSPACE_YAML.tmp"
            else
              { printf 'packages:\n  - "*"\n  - "packages/*"\n  - "apps/*"\n'; cat "$WORKSPACE_YAML"; } \
                > "$WORKSPACE_YAML.tmp"
            fi
            mv "$WORKSPACE_YAML.tmp" "$WORKSPACE_YAML"
            echo "--- pnpm-workspace.yaml (after patch) ---"
            cat "$WORKSPACE_YAML"
          fi

          cd "$WORKSPACE_ABS"
          pnpm install --no-frozen-lockfile --shamefully-hoist

          echo "=== Verifying expo was installed in the app package ==="
          cd "$APP_ABS"

          if ! pnpm list expo --depth 0 2>/dev/null | grep -q expo; then
            echo "ERROR: 'expo' still did not resolve into $APP_ABS/node_modules."
            echo "--- Workspace packages pnpm recognizes now ---"
            cd "$WORKSPACE_ABS" && pnpm -r exec -- pwd 2>/dev/null || true
            exit 1
          fi

          if [ ! -e "./node_modules/.bin/expo" ]; then
            echo "ERROR: expo resolved but node_modules/.bin/expo was not created."
            ls -la node_modules/.bin | head -50
            exit 1
          fi

          echo "expo binary confirmed at $(pwd)/node_modules/.bin/expo"

      - name: Expo prebuild (generate Android project)
        script: |
          set -e
          APP_DIR=$(find . -maxdepth 4 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          echo "Running prebuild in: $APP_DIR"

          cd "$APP_DIR"

          # Use pnpm's own resolution instead of a manual node_modules/.bin check.
          # This never falls back to the legacy global expo-cli, which is
          # deprecated, incompatible with Node 17+, and was masking the real
          # "expo not installed" error in earlier build logs.
          pnpm exec expo prebuild --platform android --clean --no-install

      - name: Set Android SDK path
        script: |
          APP_DIR=$(find . -maxdepth 4 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$APP_DIR/android/local.properties"

      - name: Configure release keystore
        script: |
          APP_DIR=$(find . -maxdepth 4 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          ANDROID_DIR="$APP_DIR/android"
          APP_GRADLE="$ANDROID_DIR/app/build.gradle"

          echo "Decoding keystore into $ANDROID_DIR/app/release.keystore"
          echo "$CM_KEYSTORE" | base64 --decode > "$ANDROID_DIR/app/release.keystore"

          cat >> "$ANDROID_DIR/gradle.properties" << PROPS
          MYAPP_RELEASE_STORE_FILE=release.keystore
          MYAPP_RELEASE_KEY_ALIAS=${CM_KEY_ALIAS}
          MYAPP_RELEASE_STORE_PASSWORD=${CM_KEYSTORE_PASSWORD}
          MYAPP_RELEASE_KEY_PASSWORD=${CM_KEY_PASSWORD}
          PROPS

          node -e "
            const fs = require('fs');
            const file = '$APP_GRADLE';
            let src = fs.readFileSync(file, 'utf8');
            const block = \`
              release {
                  storeFile file(MYAPP_RELEASE_STORE_FILE)
                  storePassword MYAPP_RELEASE_STORE_PASSWORD
                  keyAlias MYAPP_RELEASE_KEY_ALIAS
                  keyPassword MYAPP_RELEASE_KEY_PASSWORD
              }\`;
            if (!src.includes('MYAPP_RELEASE_STORE_FILE')) {
              src = src.replace(/signingConfigs\s*\{/, 'signingConfigs {' + block);
            }
            src = src.replace(/signingConfig signingConfigs\.debug/g, 'signingConfig signingConfigs.release');
            fs.writeFileSync(file, src);
            console.log('build.gradle patched.');
          "

      - name: Build release APK
        script: |
          set -e
          APP_DIR=$(find . -maxdepth 4 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          APP_ABS=$(cd "$APP_DIR" && pwd)

          # Gradle's createBundleReleaseJsAndAssets spawns a bare `node` process
          # that cannot find babel-preset-expo because it runs outside of pnpm's
          # module resolution context. Fix: pre-bundle the JS ourselves via pnpm
          # exec (which has the full resolution context), then tell Gradle to skip
          # the bundle task since it is already done.
          echo "=== Pre-bundling JS via expo export:embed ==="
          mkdir -p "$APP_ABS/android/app/src/main/assets"
          cd "$APP_ABS"
          NODE_ENV=production ./node_modules/.bin/expo export:embed \
            --platform android \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --dev false

          echo "=== Bundle complete, running Gradle (skipping bundle task) ==="
          cd "$APP_ABS/android"
          chmod +x ./gradlew
          ./gradlew assembleRelease -x createBundleReleaseJsAndAssets --no-daemon

    artifacts:
      - "**/app/build/outputs/apk/**/*.apk"

    publishing:
      scripts:
        - name: Upload APK to Supabase
          script: |
            set -e

            if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ] || [ -z "$SUPABASE_BUCKET" ]; then
              echo "Supabase vars not set — skipping upload."
              exit 0
            fi

            APK=$(find . -path "*/app/build/outputs/apk/*.apk" -o \
                         -path "*/app/build/outputs/apk/**/*.apk" 2>/dev/null | head -1)
            if [ -z "$APK" ]; then echo "No APK found!"; exit 1; fi

            APP_JSON=$(find . -maxdepth 4 -name "app.json" \
              -exec grep -l '"expo"' {} \; 2>/dev/null | head -1)
            VERSION=$(node -e "console.log(require('$APP_JSON').expo.version)")
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            VERSIONED="flashlight-strobe-v${VERSION}-${TIMESTAMP}.apk"
            LATEST="flashlight-strobe-latest.apk"

            upload() {
              HTTP=$(curl -fsSL -o /dev/null -w "%{http_code}" \
                -X POST \
                "${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/$1?upsert=true" \
                -H "Authorization: Bearer ${SUPABASE_KEY}" \
                -H "Content-Type: application/octet-stream" \
                -H "x-upsert: true" \
                --data-binary @"${APK}")
              echo "$1 -> HTTP $HTTP"
              [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || exit 1
            }

            upload "$VERSIONED"
            upload "$LATEST"

            echo "Done: ${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${LATEST}"
            echo "Update remote config: latestApkVersion=${VERSION}"
