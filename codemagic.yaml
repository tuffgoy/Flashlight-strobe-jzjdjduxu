workflows:
  android-apk:
    name: Flashlight Strobe - Release APK
    max_build_duration: 90
    environment:
      java: 17
      groups:
        - SUPABASE
        - CM
      vars:
        COREPACK_ENABLE_STRICT: "0"
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - $HOME/.cache/pnpm

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Show repo structure
        script: |
          echo "=== Working directory ==="
          pwd
          echo "=== Root contents ==="
          ls -la
          echo "=== All app.json files found ==="
          find . -maxdepth 4 -name "app.json" 2>/dev/null
          echo "=== All pnpm-workspace.yaml files found ==="
          find . -maxdepth 5 -name "pnpm-workspace.yaml" 2>/dev/null

      - name: Install pnpm
        script: |
          corepack disable || true
          npm install -g pnpm@latest --force
          pnpm --version

      - name: Install JS dependencies
        script: |
          set -e
          
          # 1. Locate the workspace parent directory dynamically
          WORKSPACE_DIR=$(find . -maxdepth 4 -name "pnpm-workspace.yaml" 2>/dev/null | head -1 | xargs dirname)
          if [ -z "$WORKSPACE_DIR" ] || [ "$WORKSPACE_DIR" = "." ]; then
            WORKSPACE_ABS=$(pwd)
          else
            WORKSPACE_ABS=$(cd "$WORKSPACE_DIR" && pwd)
          fi
          echo "Workspace root found at: $WORKSPACE_ABS"

          # 2. Patch configs safely for headless Android compilation environment
          APP_DIR=$(find . -maxdepth 4 -name "app.json" -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          APP_ABS=$(cd "$APP_DIR" && pwd)
          echo "Expo app package found at: $APP_ABS"

          cd "$APP_ABS"
          if [ -f "pnpm-workspace.yaml" ]; then
            sed -i 's|  - artifacts/\*|  - flashlight-strobe|' pnpm-workspace.yaml
            sed -i '/^  - lib\/\*/d' pnpm-workspace.yaml
            sed -i '/^  - lib\/integrations\/\*/d' pnpm-workspace.yaml
            sed -i '/^  - scripts/d' pnpm-workspace.yaml
          fi

          node -e "
            const fs = require('fs');
            if (fs.existsSync('package.json')) {
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              if (pkg.devDependencies) delete pkg.devDependencies['@workspace/api-client-react'];
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            }
          "

          # 3. Clean native pnpm install (No standard npm mixed protocols)
          cd "$WORKSPACE_ABS"
          pnpm install --no-frozen-lockfile --shamefully-hoist

            - name: Build release APK
        script: |
          set -e
          
          # Find the app and workspace directories
          WORKSPACE_DIR=$(find . -maxdepth 4 -name "pnpm-workspace.yaml" 2>/dev/null | head -1 | xargs dirname)
          if [ -z "$WORKSPACE_DIR" ] || [ "$WORKSPACE_DIR" = "." ]; then WORKSPACE_ABS=$(pwd); else WORKSPACE_ABS=$(cd "$WORKSPACE_DIR" && pwd); fi
          
          APP_DIR=$(find . -maxdepth 4 -name "app.json" -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          APP_ABS=$(cd "$APP_DIR" && pwd)

          echo "=== Pre-bundling JS via isolated expo export:embed ==="
          mkdir -p "$APP_ABS/android/app/src/main/assets"
          
          # Locate the absolute path of the local expo bin
          EXPO_BIN=$(find "$WORKSPACE_ABS/node_modules/.bin" "$APP_ABS/node_modules/.bin" -name "expo" -type f 2>/dev/null | head -1)
          echo "Using expo binary path: $EXPO_BIN"
          
          # Execute bundler directly inside the target application directory
          cd "$APP_ABS"
          NODE_ENV=production "$EXPO_BIN" export:embed \
            --platform android \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --dev false

          echo "=== Native Bundle compilation completed successfully ==="
          echo "=== Launching Gradle distribution compilation (Skipping broken bundle sub-task) ==="
          cd "$APP_ABS/android"
          chmod +x ./gradlew
          ./gradlew assembleRelease -x createBundleReleaseJsAndAssets --no-daemon


      - name: Upload APK to Supabase
        script: |
          set -e
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ] || [ -z "$SUPABASE_BUCKET" ]; then
            echo "Supabase variables missing — skipping binary sync pipeline."
            exit 0
          fi

          APK=$(find . -path "*/app/build/outputs/apk/*.apk" -o -path "*/app/build/outputs/apk/**/*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then echo "Build failure: No compiled APK artifact detected."; exit 1; fi

          APP_JSON=$(find . -maxdepth 4 -name "app.json" -exec grep -l '"expo"' {} \; 2>/dev/null | head -1)
          VERSION=$(node -e "console.log(require('$APP_JSON').expo.version)")
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          VERSIONED="flashlight-strobe-v${VERSION}-${TIMESTAMP}.apk"
          LATEST="flashlight-strobe-latest.apk"

          upload() {
            HTTP=$(curl -fsSL -o /dev/null -w "%{http_code}" \
              -X POST \
              "${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/$1?upsert=true" \
              -H "Authorization: Bearer ${SUPABASE_KEY}" \
              -H "Content-Type: application/octet-stream" \
              -H "x-upsert: true" \
              --data-binary @"${APK}")
            echo "Sync result for $1 -> Status code: $HTTP"
            [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ]
          }

          echo "Pushing artifacts to target bucket..."
          upload "$VERSIONED" || exit 1
          upload "$LATEST" || exit 1
          echo "Deployment successful."
