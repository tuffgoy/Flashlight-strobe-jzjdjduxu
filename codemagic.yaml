workflows:
  android-apk:
    name: Flashlight Strobe - Release APK
    max_build_duration: 90
    environment:
      java: 17
      groups:
        - SUPABASE
        - CM
      vars:
        COREPACK_ENABLE_STRICT: "0"
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - $HOME/.cache/pnpm

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Show repo structure
        script: |
          echo "=== Hardcoded Directory Layout Sanity Check ==="
          pwd
          ls -la
          echo "=== Checking App Subfolder ==="
          if [ -d "flashlight-strobe" ]; then
            ls -la flashlight-strobe
          else
            echo "ERROR: flashlight-strobe folder not found in current directory"
          fi

      - name: Install pnpm
        script: |
          corepack disable || true
          npm install -g pnpm@latest --force
          pnpm --version

      - name: Install JS dependencies
        script: |
          set -e
          
          # Run directly from the workspace root folder where pnpm-workspace.yaml is
          echo "=== Patching workspace configuration ==="
          if [ -f "pnpm-workspace.yaml" ]; then
            sed -i 's|  - artifacts/\*|  - flashlight-strobe|' pnpm-workspace.yaml
            sed -i '/^  - lib\/\*/d' pnpm-workspace.yaml
            sed -i '/^  - lib\/integrations\/\*/d' pnpm-workspace.yaml
            sed -i '/^  - scripts/d' pnpm-workspace.yaml
          fi

          echo "=== Removing incompatible private workspaces ==="
          node -e "
            const fs = require('fs');
            if (fs.existsSync('package.json')) {
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              if (pkg.devDependencies) delete pkg.devDependencies['@workspace/api-client-react'];
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            }
          "

          # Clean workspace install at the root level using the correct manager context
          echo "=== Running pnpm install ==="
          pnpm install --no-frozen-lockfile --shamefully-hoist

      - name: Build release APK
        script: |
          set -e
          
          # Define exact workspace and app locations based on known monorepo structure
          REPO_ROOT=$(pwd)
          APP_ABS="$REPO_ROOT/flashlight-strobe"
          
          echo "=== Pre-bundling JS via isolated expo export:embed ==="
          mkdir -p "$APP_ABS/android/app/src/main/assets"
          
          # Target the exact binary built into the workspace root node_modules
          EXPO_BIN="$REPO_ROOT/node_modules/.bin/expo"
          echo "Using verified expo binary path: $EXPO_BIN"
          
          # Execute the bundler cleanly from the inner app folder
          cd "$APP_ABS"
          NODE_ENV=production "$EXPO_BIN" export:embed \
            --platform android \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --dev false

          echo "=== Native Bundle compilation completed successfully ==="
          echo "=== Launching Gradle distribution compilation ==="
          
          # Navigate directly into the explicit android folder to avoid matching plugins
          cd "$APP_ABS/android"
          chmod +x ./gradlew
          ./gradlew assembleRelease -x createBundleReleaseJsAndAssets --no-daemon

      - name: Upload APK to Supabase
        script: |
          set -e
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ] || [ -z "$SUPABASE_BUCKET" ]; then
            echo "Supabase variables missing — skipping binary sync pipeline."
            exit 0
          fi

          REPO_ROOT=$(pwd)
          APP_ABS="$REPO_ROOT/flashlight-strobe"

          # Locate built binary artifact explicitly via local output paths
          APK=$(find "$APP_ABS/android" -path "*/app/build/outputs/apk/*.apk" -o -path "*/app/build/outputs/apk/**/*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then echo "Build failure: No compiled APK artifact detected."; exit 1; fi

          VERSION=$(node -e "console.log(require('$APP_ABS/app.json').expo.version)")
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          VERSIONED="flashlight-strobe-v${VERSION}-${TIMESTAMP}.apk"
          LATEST="flashlight-strobe-latest.apk"
          
          upload() {
            HTTP=$(curl -fsSL -o /dev/null -w "%{http_code}" \
              -X POST \
              "${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/$1?upsert=true" \
              -H "Authorization: Bearer ${SUPABASE_KEY}" \
              -H "Content-Type: application/octet-stream" \
              -H "x-upsert: true" \
              --data-binary @"${APK}")
            echo "Sync result for $1 -> Status code: $HTTP"
            [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ]
          }

          echo "Pushing artifacts to target bucket..."
          upload "$VERSIONED" || exit 1
          upload "$LATEST" || exit 1
          echo "Deployment successful."
