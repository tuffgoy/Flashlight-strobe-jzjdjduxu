workflows:
  android-apk:
    name: Flashlight Strobe - Release APK
    max_build_duration: 90
    environment:
      java: 17
      groups:
        - SUPABASE
        - CM
      vars:
        COREPACK_ENABLE_STRICT: "0"
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - $HOME/.cache/pnpm

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Show repo structure
        script: |
          echo "=== Working directory ==="
          pwd
          echo "=== Root contents ==="
          ls -la
          echo "=== All app.json files found ==="
          find . -maxdepth 4 -name "app.json" 2>/dev/null

      - name: Install pnpm
        script: |
          corepack disable || true
          npm install -g pnpm@9 --force
          pnpm --version

      - name: Install JS dependencies
        script: |
          APP_DIR=$(find . -maxdepth 4 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          echo "Expo app found at: $APP_DIR"
          
          # Force navigate into the actual app directory
          cd "$APP_DIR"
          pnpm install --no-frozen-lockfile

      - name: Expo prebuild (generate Android project)
        script: |
          APP_DIR=$(find . -maxdepth 4 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          echo "Running prebuild in: $APP_DIR"
          
          cd "$APP_DIR"
          
          # Explicitly add the local node_modules bin to the PATH so npx can find expo
          export PATH="$PWD/node_modules/.bin:$PATH"
          
          # Run prebuild using the explicit local binary package
          if [ -f "./node_modules/.bin/expo" ]; then
            ./node_modules/.bin/expo prebuild --platform android --clean --no-install
          else
            # If it still isn't found, force-install expo globally just for the CLI runner
            npm install -g expo-cli
            npx expo prebuild --platform android --clean --no-install
          fi

      - name: Set Android SDK path
        script: |
          APP_DIR=$(find . -maxdepth 4 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$APP_DIR/android/local.properties"

      - name: Configure release keystore
        script: |
          APP_DIR=$(find . -maxdepth 4 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          ANDROID_DIR="$APP_DIR/android"
          APP_GRADLE="$ANDROID_DIR/app/build.gradle"

          echo "Decoding keystore into $ANDROID_DIR/app/release.keystore"
          echo "$CM_KEYSTORE" | base64 --decode > "$ANDROID_DIR/app/release.keystore"

          cat >> "$ANDROID_DIR/gradle.properties" << PROPS
          MYAPP_RELEASE_STORE_FILE=release.keystore
          MYAPP_RELEASE_KEY_ALIAS=${CM_KEY_ALIAS}
          MYAPP_RELEASE_STORE_PASSWORD=${CM_KEYSTORE_PASSWORD}
          MYAPP_RELEASE_KEY_PASSWORD=${CM_KEY_PASSWORD}
          PROPS

          node -e "
            const fs = require('fs');
            const file = '$APP_GRADLE';
            let src = fs.readFileSync(file, 'utf8');
            const block = \`
              release {
                  storeFile file(MYAPP_RELEASE_STORE_FILE)
                  storePassword MYAPP_RELEASE_STORE_PASSWORD
                  keyAlias MYAPP_RELEASE_KEY_ALIAS
                  keyPassword MYAPP_RELEASE_KEY_PASSWORD
              }\`;
            if (!src.includes('MYAPP_RELEASE_STORE_FILE')) {
              src = src.replace(/signingConfigs\s*\{/, 'signingConfigs {' + block);
            }
            src = src.replace(/signingConfig signingConfigs\.debug/g, 'signingConfig signingConfigs.release');
            fs.writeFileSync(file, src);
            console.log('build.gradle patched.');
          "

      - name: Build release APK
        script: |
          APP_DIR=$(find . -maxdepth 4 -name "app.json" \
            -exec grep -l '"expo"' {} \; 2>/dev/null | head -1 | xargs dirname)
          cd "$APP_DIR/android"
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

    artifacts:
      - "**/app/build/outputs/apk/**/*.apk"

    publishing:
      scripts:
        - name: Upload APK to Supabase
          script: |
            set -e

            if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ] || [ -z "$SUPABASE_BUCKET" ]; then
              echo "Supabase vars not set — skipping upload."
              exit 0
            fi

            APK=$(find . -path "*/app/build/outputs/apk/*.apk" -o \
                         -path "*/app/build/outputs/apk/**/*.apk" 2>/dev/null | head -1)
            if [ -z "$APK" ]; then echo "No APK found!"; exit 1; fi

            APP_JSON=$(find . -maxdepth 4 -name "app.json" \
              -exec grep -l '"expo"' {} \; 2>/dev/null | head -1)
            VERSION=$(node -e "console.log(require('$APP_JSON').expo.version)")
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            VERSIONED="flashlight-strobe-v${VERSION}-${TIMESTAMP}.apk"
            LATEST="flashlight-strobe-latest.apk"

            upload() {
              HTTP=$(curl -fsSL -o /dev/null -w "%{http_code}" \
                -X POST \
                "${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/$1?upsert=true" \
                -H "Authorization: Bearer ${SUPABASE_KEY}" \
                -H "Content-Type: application/octet-stream" \
                -H "x-upsert: true" \
                --data-binary @"${APK}")
              echo "$1 -> HTTP $HTTP"
              [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || exit 1
            }

            upload "$VERSIONED"
            upload "$LATEST"

            echo "Done: ${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${LATEST}"
            echo "Update remote config: latestApkVersion=${VERSION}"
