workflows:
  android-apk:
    name: Build Release APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - CM        # CM_KEYSTORE, CM_KEY_ALIAS, CM_KEYSTORE_PASSWORD, CM_KEY_PASSWORD
        - SUPABASE  # SUPABASE_URL, SUPABASE_KEY, SUPABASE_BUCKET

    scripts:
      - name: Install pnpm 9
        script: |
          npm install -g pnpm@9

      - name: Install JS deps + babel-preset-expo fix
        script: |
          # IMPORTANT: capture REPO_ROOT before any cd — never after
          REPO_ROOT=$(pwd)
          APP_NM="$REPO_ROOT/flashlight-strobe-github/flashlight-strobe/node_modules"

          # Install workspace deps (shamefully-hoist so Metro can resolve them)
          cd "$REPO_ROOT/flashlight-strobe-github"
          pnpm install --no-frozen-lockfile --shamefully-hoist

          # Bug 1 fix: babel-preset-expo is NOT in the app's package.json (catalog:
          # conflict prevents adding it there). Install it in a temp dir and copy in.
          mkdir -p /tmp/bpe && cd /tmp/bpe
          npm init -y > /dev/null 2>&1
          npm install babel-preset-expo --legacy-peer-deps --no-package-lock
          cp -r node_modules/babel-preset-expo "$APP_NM/"

      - name: Expo prebuild
        script: |
          REPO_ROOT=$(pwd)
          cd "$REPO_ROOT/flashlight-strobe-github/flashlight-strobe"
          npx expo prebuild --platform android --no-install --clean

      - name: Restore pnpm-aware metro.config.js (belt-and-suspenders)
        # expo prebuild may overwrite metro.config.js. Decode the committed
        # version from base64 to guarantee the pnpm-aware regex is always present.
        #
        # Bug 2+3 fix: react-native-svg@15.x uses ES2022 private class fields
        # (#x, #y, #width, #height). hermesc rejects them. Metro must transform
        # react-native-svg, but the standard transformIgnorePatterns regex fails
        # silently with pnpm because pnpm stores packages at:
        #   node_modules/.pnpm/<pkg>@<ver>_<hash>/node_modules/<pkg>/
        # The negative lookahead sees ".pnpm" (not in the allowlist) at the first
        # "node_modules/" and marks every package as ignored.
        # The fix: add optional (\.pnpm\/[^/]+\/node_modules\/)? inside the lookahead.
        script: |
          REPO_ROOT=$(pwd)
          echo '' \
            | base64 -d > "$REPO_ROOT/flashlight-strobe-github/flashlight-strobe/metro.config.js"
          echo "metro.config.js restored — pnpm-aware transformIgnorePatterns in place"

      - name: Configure Android signing
        script: |
          REPO_ROOT=$(pwd)
          ANDROID_DIR="$REPO_ROOT/flashlight-strobe-github/flashlight-strobe/android"

          # local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$ANDROID_DIR/local.properties"

          # Decode keystore
          echo "$CM_KEYSTORE" | base64 -d > /tmp/release.keystore

          # Patch android/app/build.gradle to add release signing config
          python3 - "$ANDROID_DIR/app/build.gradle" <<'PYEOF'
          import sys, re

          path = sys.argv[1]
          text = open(path).read()

          signing_block = """
              signingConfigs {
                  release {
                      storeFile file('/tmp/release.keystore')
                      storePassword System.getenv('CM_KEYSTORE_PASSWORD')
                      keyAlias System.getenv('CM_KEY_ALIAS')
                      keyPassword System.getenv('CM_KEY_PASSWORD')
                  }
              }
          """

          # Insert signingConfigs before the buildTypes block (idempotent guard)
          if 'signingConfigs {' not in text:
              text = re.sub(r'(\s*buildTypes\s*\{)', signing_block + r'\1', text, count=1)

          # Point release buildType at the release signingConfig
          text = re.sub(
              r'(buildTypes\s*\{[^}]*release\s*\{[^}]*?)signingConfig\s+signingConfigs\.\w+',
              r'\1signingConfig signingConfigs.release',
              text,
              flags=re.DOTALL,
          )

          # If there was no existing signingConfig line inside release {}, add one
          if 'signingConfigs.release' not in text:
              text = re.sub(
                  r'(buildTypes\s*\{[^}]*release\s*\{)',
                  r'\1\n            signingConfig signingConfigs.release',
                  text,
                  flags=re.DOTALL,
              )

          open(path, 'w').write(text)
          print("build.gradle patched OK")
          PYEOF

      - name: Build release APK
        script: |
          REPO_ROOT=$(pwd)
          cd "$REPO_ROOT/flashlight-strobe-github/flashlight-strobe/android"
          ./gradlew assembleRelease --no-daemon

      - name: Upload to Supabase Storage
        script: |
          REPO_ROOT=$(pwd)
          APK="$REPO_ROOT/flashlight-strobe-github/flashlight-strobe/android/app/build/outputs/apk/release/app-release.apk"

          # Read version from app.json
          VERSION=$(python3 -c "import json; d=json.load(open('$REPO_ROOT/flashlight-strobe-github/flashlight-strobe/app.json')); print(d['expo']['version'])")
          echo "Uploading APK version: $VERSION"

          # Upload versioned copy (POST — creates new object)
          curl -fsSL -X POST \
            "$SUPABASE_URL/storage/v1/object/$SUPABASE_BUCKET/flashlight-strobe-v${VERSION}.apk" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$APK"

          # Upload / overwrite latest (upsert)
          curl -fsSL -X POST \
            "$SUPABASE_URL/storage/v1/object/$SUPABASE_BUCKET/flashlight-strobe-latest.apk" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "x-upsert: true" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$APK"

          echo "Upload complete — flashlight-strobe-v${VERSION}.apk + flashlight-strobe-latest.apk"

    artifacts:
      - flashlight-strobe-github/flashlight-strobe/android/app/build/outputs/apk/release/app-release.apk
