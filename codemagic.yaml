workflows:
  android-apk:
    name: Flashlight Strobe - Release APK
    max_build_duration: 90
    environment:
      java: 17
      groups:
        - SUPABASE
        - CM
      vars:
        COREPACK_ENABLE_STRICT: "0"
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - $HOME/.cache/pnpm

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install pnpm
        script: |
          corepack disable || true
          npm install -g pnpm@latest --force
          pnpm --version

      - name: Install JS dependencies
        script: |
          set -e

          # The repo structure is: repo-root/ contains pnpm-workspace.yaml
          # and flashlight-strobe/ is the Expo app workspace member.
          WORKSPACE_ABS=$(pwd)
          APP_ABS="$WORKSPACE_ABS/flashlight-strobe"

          echo "Workspace root: $WORKSPACE_ABS"
          echo "App dir:        $APP_ABS"

          # Install all workspace dependencies.
          # --shamefully-hoist lifts packages to the root node_modules where
          # possible, but pnpm still keeps transitive deps in .pnpm/ store.
          pnpm install --no-frozen-lockfile --shamefully-hoist

          # CRITICAL: babel-preset-expo is a transitive dep that lives inside
          # pnpm's .pnpm virtual store and is NOT directly available in either
          # the workspace root or app node_modules via normal require() resolution.
          # NODE_PATH tricks don't help because pnpm's isolated store means
          # there is no flat babel-preset-expo/ symlink to point at.
          #
          # Fix: install it directly into the app's node_modules using npm
          # (--no-save skips package.json modification). Metro and Babel will
          # find it via standard upward directory traversal from the app root.
          echo "Ensuring babel-preset-expo is resolvable from app directory..."
          cd "$APP_ABS"
          if ! node -e "require.resolve('babel-preset-expo')" 2>/dev/null; then
            echo "babel-preset-expo not found — installing locally with npm..."
            npm install --no-save babel-preset-expo
            echo "babel-preset-expo installed successfully."
          else
            echo "babel-preset-expo already resolvable — skipping."
          fi

      - name: Expo prebuild (generate Android project)
        script: |
          set -e
          cd flashlight-strobe
          pnpm exec expo prebuild --platform android --clean --no-install

      - name: Set Android SDK path
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > flashlight-strobe/android/local.properties

      - name: Configure release keystore
        script: |
          set -e
          ANDROID_DIR="flashlight-strobe/android"
          APP_GRADLE="$ANDROID_DIR/app/build.gradle"

          echo "Decoding keystore..."
          echo "$CM_KEYSTORE" | base64 --decode > "$ANDROID_DIR/app/release.keystore"

          cat >> "$ANDROID_DIR/gradle.properties" << PROPS
          MYAPP_RELEASE_STORE_FILE=release.keystore
          MYAPP_RELEASE_KEY_ALIAS=${CM_KEY_ALIAS}
          MYAPP_RELEASE_STORE_PASSWORD=${CM_KEYSTORE_PASSWORD}
          MYAPP_RELEASE_KEY_PASSWORD=${CM_KEY_PASSWORD}
          PROPS

          node -e "
            const fs = require('fs');
            const file = '$APP_GRADLE';
            let src = fs.readFileSync(file, 'utf8');
            const block = \`
              release {
                  storeFile file(MYAPP_RELEASE_STORE_FILE)
                  storePassword MYAPP_RELEASE_STORE_PASSWORD
                  keyAlias MYAPP_RELEASE_KEY_ALIAS
                  keyPassword MYAPP_RELEASE_KEY_PASSWORD
              }\`;
            if (!src.includes('MYAPP_RELEASE_STORE_FILE')) {
              src = src.replace(/signingConfigs\s*\{/, 'signingConfigs {' + block);
            }
            src = src.replace(/signingConfig signingConfigs\.debug/g, 'signingConfig signingConfigs.release');
            fs.writeFileSync(file, src);
            console.log('build.gradle patched.');
          "

      - name: Build release APK
        script: |
          set -e
          export NODE_ENV=production
          cd flashlight-strobe/android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

    artifacts:
      - "**/app/build/outputs/apk/**/*.apk"

    publishing:
      scripts:
        - name: Upload APK to Supabase
          script: |
            set -e

            if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ] || [ -z "$SUPABASE_BUCKET" ]; then
              echo "Supabase vars not set — skipping upload."
              exit 0
            fi

            APK=$(find . -path "*/app/build/outputs/apk/*.apk" -o \
                         -path "*/app/build/outputs/apk/**/*.apk" 2>/dev/null | head -1)
            if [ -z "$APK" ]; then echo "No APK found!"; exit 1; fi

            VERSION=$(node -e "console.log(require('./flashlight-strobe/app.json').expo.version)")
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            VERSIONED="flashlight-strobe-v${VERSION}-${TIMESTAMP}.apk"
            LATEST="flashlight-strobe-latest.apk"

            upload() {
              HTTP=$(curl -fsSL -o /dev/null -w "%{http_code}" \
                -X POST \
                "${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/$1?upsert=true" \
                -H "Authorization: Bearer ${SUPABASE_KEY}" \
                -H "Content-Type: application/octet-stream" \
                -H "x-upsert: true" \
                --data-binary @"${APK}")
              echo "$1 -> HTTP $HTTP"
              [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ] || exit 1
            }

            upload "$VERSIONED"
            upload "$LATEST"

            echo "Done: ${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${LATEST}"
            echo "Update remote config: latestApkVersion=${VERSION}"
