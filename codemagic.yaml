workflows:
  android-apk:
    name: Flashlight Strobe - Release APK
    max_build_duration: 90

    environment:
      java: 17
      groups:
        - SUPABASE
        - CM

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - ~/.pnpm-store

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm@9
          pnpm --version

      - name: Install workspace dependencies
        script: |
          cd flashlight-strobe-github
          pnpm install --no-frozen-lockfile

      - name: Expo prebuild
        script: |
          cd flashlight-strobe-github/flashlight-strobe
          npx expo prebuild --platform android --clean --no-install

      - name: Set Android SDK path
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > flashlight-strobe-github/flashlight-strobe/android/local.properties

      - name: Configure release keystore
        script: |
          set -e
          ANDROID_DIR="flashlight-strobe-github/flashlight-strobe/android"
          if [ -z "$CM_KEYSTORE" ]; then
            echo "No keystore provided - building unsigned debug APK"
            exit 0
          fi
          echo "$CM_KEYSTORE" | base64 --decode > "$ANDROID_DIR/app/release.keystore"
          printf 'MYAPP_RELEASE_STORE_FILE=release.keystore\n' >> "$ANDROID_DIR/gradle.properties"
          printf 'MYAPP_RELEASE_KEY_ALIAS=%s\n' "$CM_KEY_ALIAS" >> "$ANDROID_DIR/gradle.properties"
          printf 'MYAPP_RELEASE_STORE_PASSWORD=%s\n' "$CM_KEYSTORE_PASSWORD" >> "$ANDROID_DIR/gradle.properties"
          printf 'MYAPP_RELEASE_KEY_PASSWORD=%s\n' "$CM_KEY_PASSWORD" >> "$ANDROID_DIR/gradle.properties"
          export GRADLE_FILE="$ANDROID_DIR/app/build.gradle"
          node -e '
            var fs = require("fs");
            var f = process.env.GRADLE_FILE;
            var s = fs.readFileSync(f, "utf8");
            var b = "\n    release {\n        storeFile file(MYAPP_RELEASE_STORE_FILE)\n        storePassword MYAPP_RELEASE_STORE_PASSWORD\n        keyAlias MYAPP_RELEASE_KEY_ALIAS\n        keyPassword MYAPP_RELEASE_KEY_PASSWORD\n    }";
            if (s.indexOf("MYAPP_RELEASE_STORE_FILE") === -1) {
              s = s.replace(/signingConfigs\s*\{/, "signingConfigs {" + b);
            }
            s = s.replace(/signingConfig signingConfigs\.debug/g, "signingConfig signingConfigs.release");
            fs.writeFileSync(f, s);
            console.log("build.gradle patched");
          '

      - name: Build APK
        script: |
          set -e
          cd flashlight-strobe-github/flashlight-strobe/android
          chmod +x ./gradlew
          if [ -n "$CM_KEYSTORE" ]; then
            ./gradlew assembleRelease --no-daemon
          else
            ./gradlew assembleDebug --no-daemon
          fi

    artifacts:
      - "**/app/build/outputs/apk/**/*.apk"

    publishing:
      scripts:
        - name: Upload APK to Supabase
          script: |
            set -e
            if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ] || [ -z "$SUPABASE_BUCKET" ]; then
              echo "Supabase vars not set - skipping upload"
              exit 0
            fi
            APK=$(find . -name "*.apk" -path "*/outputs/apk/*" | head -1)
            if [ -z "$APK" ]; then
              echo "No APK found"
              exit 1
            fi
            echo "Found APK at $APK"
            VERSION=$(node -e "console.log(require('./flashlight-strobe-github/flashlight-strobe/app.json').expo.version)")
            STAMP=$(date +%Y%m%d-%H%M%S)
            NAMED="flashlight-strobe-v${VERSION}-${STAMP}.apk"
            LATEST="flashlight-strobe-latest.apk"
            for DEST in "$NAMED" "$LATEST"; do
              CODE=$(curl -fsSL -o /dev/null -w "%{http_code}" \
                -X POST "${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/${DEST}?upsert=true" \
                -H "Authorization: Bearer ${SUPABASE_KEY}" \
                -H "Content-Type: application/octet-stream" \
                -H "x-upsert: true" \
                --data-binary @"$APK")
              echo "$DEST uploaded with HTTP $CODE"
              if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then exit 1; fi
            done
            echo "Latest APK at ${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${LATEST}"
