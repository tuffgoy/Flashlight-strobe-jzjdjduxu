name: Unzip and Commit Folder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  unzip-and-push:
    runs-on: ubuntu-latest

    # Gives the workflow permission to write changes back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip folder
        run: |
          if [ -f "flashlight-strobe-github.zip" ]; then
            # Unzips directly into the repository root directory
            unzip -o flashlight-strobe-github.zip -d ./
            echo "Successfully unzipped folder."
          else
            echo "Error: flashlight-strobe-github.zip not found!"
            exit 1
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          # Check if there are actually changes to commit so it doesn't fail
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "Automated unzip of flashlight-strobe-github.zip"
            git push
          fi
