name: Zip Flashlight Folder

on:
  push:
    branches:
      - main # Change this to your default branch name if it is different (e.g., master)
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  zip-project:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository content
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Zip the specified folder
      - name: Create Zip Archive
        run: |
          zip -r flashlight-strobe-github1.zip flashlight-strobe-github

      # Step 3: Upload the zip file as a build artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flashlight-strobe-zip
          path: flashlight-strobe-github1.zip
