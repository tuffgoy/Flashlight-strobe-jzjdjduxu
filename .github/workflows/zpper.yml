name: Auto-Zip and Commit Folder

on:
  push:
    branches: [ "main" ]
    paths:
      - 'flashlight-strobe-github/**' # Triggers only when files inside this folder change
  workflow_dispatch:

jobs:
  zip-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 1: Check if the folder exists, then zip it
      - name: Create Zip Archive
        run: |
          if [ -d "flashlight-strobe-github" ]; then
            zip -r flashlight-strobe-github1.zip flashlight-strobe-github
            echo "Successfully zipped folder."
          else
            echo "Error: flashlight-strobe-github folder not found!"
            exit 1
          fi

      # Step 2: Commit the new zip file back into the repository root
      - name: Commit and Push Zip
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add flashlight-strobe-github1.zip
          
          if git diff-index --quiet HEAD; then
            echo "No changes in the zip archive to commit"
          else
            git commit -m "Automated update of flashlight-strobe-github1.zip"
            git push
          fi
